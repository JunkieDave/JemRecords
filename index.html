<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jem Records - Define Reality</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; }
        header { background-color: #000000; padding: 20px; text-align: center; }
        .logo { max-width: 420px; height: auto; }
        nav { background-color: #1a1a1a; padding: 15px; text-align: center; }
        nav a { color: #ff00ff; margin: 0 20px; text-decoration: none; font-size: 1.1em; }
        .hero { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://via.placeholder.com/1920x500?text=Define+Reality'); background-size: cover; height: 380px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .section { padding: 50px 20px; max-width: 1100px; margin: 0 auto; }
        h2 { color: #ff00ff; text-align: center; margin-bottom: 30px; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .track { background-color: #1a1a1a; padding: 20px; border-radius: 12px; text-align: center; }
        .track img { width: 100%; max-height: 220px; object-fit: cover; border-radius: 8px; }
        audio { width: 100%; margin: 15px 0; }
        footer { background-color: #000000; padding: 30px; text-align: center; font-size: 0.95em; }
    </style>
</head>
<body>

    <header>
        <img src="https://junkiedave.github.io/JemRecords/jem-logo.png" alt="Jem Records Logo" class="logo">
        <p style="margin-top:10px; color:#aaa;">Define Reality's Premier Music Label</p>
    </header>

    <nav>
        <a href="#home">Home</a>
        <a href="#music">Music Library</a>
    </nav>

    <section id="home" class="hero">
        <div>
            <h1 style="font-size: 2.8em;">Where the Streets Make Hits</h1>
        </div>
    </section>

    <section id="music" class="section">
        <h2>Music Library</h2>
        <div class="music-grid">

            <div class="track">
                <img src="https://junkiedave.github.io/JemRecords/music/Alright%20with%20me.jpg" alt="Alright With Me">
                <h3>Alright With Me</h3>
                <p>Junkie Dave</p>
                <audio controls>
                    <source src="https://junkiedave.github.io/JemRecords/music/Alright%20with%20me.mp3" type="audio/mpeg">
                </audio>
                <p><a href="https://junkiedave.github.io/JemRecords/music/Alright%20with%20me.mp3" download>⬇️ Download</a></p>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Jem Records • Define Reality • All Rights Reserved</p>
    </footer>

</body>
</html>
